<!-- My Tasks Page: all tasks assigned to the current user -->
<div class="my-tasks">

  <!-- Page header -->
  <div class="my-tasks__header">
    <div class="my-tasks__header-left">
      <h1 class="my-tasks__title">My Tasks</h1>
      <span class="my-tasks__count" *ngIf="activeTasksCount$ | async as count">
        {{ count }} active
      </span>
    </div>
    <div class="my-tasks__header-right">
      <!-- View toggle -->
      <div class="my-tasks__view-toggle">
        <button
          class="my-tasks__view-btn"
          [class.my-tasks__view-btn--active]="viewMode === 'grouped'"
          (click)="setViewMode('grouped')">
          Grouped
        </button>
        <button
          class="my-tasks__view-btn"
          [class.my-tasks__view-btn--active]="viewMode === 'list'"
          (click)="setViewMode('list')">
          List
        </button>
      </div>
    </div>
  </div>

  <!-- Filters bar -->
  <app-task-filters
    [projects]="(projects$ | async) || []"
    (filtersChanged)="onFiltersChanged($event)">
  </app-task-filters>

  <!-- Error state -->
  <div class="my-tasks__error" *ngIf="error$ | async as error">
    {{ error }}
  </div>

  <!-- Loading state -->
  <app-loading-spinner
    *ngIf="loading$ | async"
    message="Loading tasks...">
  </app-loading-spinner>

  <!-- Content: grouped view -->
  <ng-container *ngIf="!(loading$ | async) && viewMode === 'grouped'">

    <!-- Overdue group -->
    <ng-container *ngIf="overdueTasks$ | async as overdueTasks">
      <section class="my-tasks__group" *ngIf="overdueTasks.length > 0">
        <h2 class="my-tasks__group-title my-tasks__group-title--overdue">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Overdue
          <span class="my-tasks__group-count">{{ overdueTasks.length }}</span>
        </h2>
        <app-task-list
          [tasks]="overdueTasks"
          [projectMap]="projectMap"
          (markDone)="onMarkDone($event)">
        </app-task-list>
      </section>
    </ng-container>

    <!-- Today group -->
    <ng-container *ngIf="todayTasks$ | async as todayTasks">
      <section class="my-tasks__group" *ngIf="todayTasks.length > 0">
        <h2 class="my-tasks__group-title my-tasks__group-title--today">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          Today
          <span class="my-tasks__group-count">{{ todayTasks.length }}</span>
        </h2>
        <app-task-list
          [tasks]="todayTasks"
          [projectMap]="projectMap"
          (markDone)="onMarkDone($event)">
        </app-task-list>
      </section>
    </ng-container>

    <!-- This Week group -->
    <ng-container *ngIf="thisWeekTasks$ | async as thisWeekTasks">
      <section class="my-tasks__group" *ngIf="thisWeekTasks.length > 0">
        <h2 class="my-tasks__group-title my-tasks__group-title--week">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          This Week
          <span class="my-tasks__group-count">{{ thisWeekTasks.length }}</span>
        </h2>
        <app-task-list
          [tasks]="thisWeekTasks"
          [projectMap]="projectMap"
          (markDone)="onMarkDone($event)">
        </app-task-list>
      </section>
    </ng-container>

    <!-- Upcoming group -->
    <ng-container *ngIf="upcomingTasks$ | async as upcomingTasks">
      <section class="my-tasks__group" *ngIf="upcomingTasks.length > 0">
        <h2 class="my-tasks__group-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
          </svg>
          Upcoming
          <span class="my-tasks__group-count">{{ upcomingTasks.length }}</span>
        </h2>
        <app-task-list
          [tasks]="upcomingTasks"
          [projectMap]="projectMap"
          (markDone)="onMarkDone($event)">
        </app-task-list>
      </section>
    </ng-container>

    <!-- No Due Date group -->
    <ng-container *ngIf="noDueDateTasks$ | async as noDueDateTasks">
      <section class="my-tasks__group" *ngIf="noDueDateTasks.length > 0">
        <h2 class="my-tasks__group-title my-tasks__group-title--no-date">
          No Due Date
          <span class="my-tasks__group-count">{{ noDueDateTasks.length }}</span>
        </h2>
        <app-task-list
          [tasks]="noDueDateTasks"
          [projectMap]="projectMap"
          (markDone)="onMarkDone($event)">
        </app-task-list>
      </section>
    </ng-container>

    <!-- Empty state (when all groups are empty) -->
    <ng-container *ngIf="filteredTasks$ | async as filteredTasks">
      <app-empty-state
        *ngIf="filteredTasks.length === 0"
        icon="tasks"
        title="No tasks found"
        subtitle="Try adjusting your filters or check back later.">
      </app-empty-state>
    </ng-container>

  </ng-container>

  <!-- Content: flat list view -->
  <ng-container *ngIf="!(loading$ | async) && viewMode === 'list'">
    <ng-container *ngIf="filteredTasks$ | async as filteredTasks">
      <div class="my-tasks__list-card" *ngIf="filteredTasks.length > 0">
        <app-task-list
          [tasks]="filteredTasks"
          [projectMap]="projectMap"
          (markDone)="onMarkDone($event)">
        </app-task-list>
      </div>

      <!-- Empty state -->
      <app-empty-state
        *ngIf="filteredTasks.length === 0"
        icon="tasks"
        title="No tasks found"
        subtitle="Try adjusting your filters or check back later.">
      </app-empty-state>
    </ng-container>
  </ng-container>

</div>
