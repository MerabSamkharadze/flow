<!-- Comment Input: textarea with @mention autocomplete + submit -->
<div class="comment-input">
  <div class="comment-input__textarea-wrap">
    <textarea
      class="comment-input__textarea"
      #textarea
      [(ngModel)]="content"
      (keydown)="onKeydown($event)"
      (input)="onInput()"
      placeholder="Write a comment... (Ctrl+Enter to submit) — type @ to mention"
      rows="2">
    </textarea>

    <!-- Mention autocomplete dropdown -->
    <app-mention-dropdown
      *ngIf="showMentionDropdown"
      [members]="members"
      [query]="mentionQuery"
      [activeIndex]="mentionActiveIndex"
      (selected)="onMentionSelected($event)">
    </app-mention-dropdown>
  </div>

  <button
    class="comment-input__btn"
    type="button"
    [disabled]="!content.trim()"
    (click)="onSubmit()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
    Send
  </button>
</div>
