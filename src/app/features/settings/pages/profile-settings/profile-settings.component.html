<!-- Profile Settings: edit display name, bio, avatar -->
<div class="profile-settings">

  <h2 class="profile-settings__heading">Profile</h2>
  <p class="profile-settings__description">Manage your public profile information.</p>

  <!-- Avatar section -->
  <div class="profile-settings__avatar-section">
    <div class="profile-settings__avatar">
      <!-- Photo or initials -->
      <img
        *ngIf="avatarUrl && !uploading"
        class="profile-settings__avatar-img"
        [src]="avatarUrl"
        alt="Profile photo" />
      <span
        *ngIf="!avatarUrl && !uploading"
        class="profile-settings__avatar-initials">
        {{ initials }}
      </span>
      <!-- Upload spinner overlay -->
      <div class="profile-settings__avatar-overlay" *ngIf="uploading">
        <svg class="profile-settings__spinner" width="28" height="28" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
    </div>
    <div class="profile-settings__avatar-actions">
      <button
        class="profile-settings__upload-btn"
        type="button"
        [disabled]="uploading"
        (click)="onChangePhotoClick()">
        {{ uploading ? 'Uploading...' : 'Change photo' }}
      </button>
      <!-- Hidden file input -->
      <input
        #fileInput
        type="file"
        accept="image/jpeg,image/png,image/webp"
        class="profile-settings__file-input"
        (change)="onFileSelected($event)" />
      <!-- Upload progress bar -->
      <div class="profile-settings__progress" *ngIf="uploading">
        <div class="profile-settings__progress-bar">
          <div
            class="profile-settings__progress-fill"
            [style.width.%]="uploadProgress">
          </div>
        </div>
        <span class="profile-settings__progress-text">{{ uploadProgress }}%</span>
      </div>
      <!-- Upload hint or error -->
      <span class="profile-settings__upload-hint" *ngIf="!uploadError && !uploading">
        Max 2MB. JPEG, PNG, or WebP.
      </span>
      <span class="profile-settings__upload-error" *ngIf="uploadError">
        {{ uploadError }}
      </span>
    </div>
  </div>

  <!-- Profile form -->
  <form class="profile-settings__form" [formGroup]="form" (ngSubmit)="onSave()">

    <!-- Display Name -->
    <div class="profile-settings__field">
      <label class="profile-settings__label" for="displayName">Display Name</label>
      <input
        class="profile-settings__input"
        id="displayName"
        type="text"
        formControlName="displayName"
        placeholder="Your display name" />
      <span class="profile-settings__error"
            *ngIf="form.get('displayName')?.touched && form.get('displayName')?.hasError('required')">
        Display name is required.
      </span>
    </div>

    <!-- Email (readonly) -->
    <div class="profile-settings__field">
      <label class="profile-settings__label" for="email">Email</label>
      <input
        class="profile-settings__input profile-settings__input--disabled"
        id="email"
        type="email"
        formControlName="email"
        placeholder="your@email.com" />
      <span class="profile-settings__hint">Email cannot be changed.</span>
    </div>

    <!-- Bio -->
    <div class="profile-settings__field">
      <label class="profile-settings__label" for="bio">Bio</label>
      <textarea
        class="profile-settings__textarea"
        id="bio"
        formControlName="bio"
        rows="3"
        placeholder="A short bio about yourself..."
        [maxlength]="bioMaxLength">
      </textarea>
      <div class="profile-settings__char-counter"
           [class.profile-settings__char-counter--warn]="bioLength > 140">
        {{ bioLength }} / {{ bioMaxLength }}
      </div>
    </div>

    <!-- Success / Error messages -->
    <div class="profile-settings__message profile-settings__message--success" *ngIf="successMessage">
      {{ successMessage }}
    </div>
    <div class="profile-settings__message profile-settings__message--error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Save button -->
    <button class="profile-settings__save-btn" type="submit"
            [disabled]="form.invalid || saving">
      <span *ngIf="!saving">Save Changes</span>
      <span *ngIf="saving">Saving...</span>
    </button>

  </form>

</div>
