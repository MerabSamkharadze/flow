<!-- Notifications Page: full-page notification feed with read/unread management -->
<div class="notifications-page">
  <div class="notifications-page__wrapper">

    <!-- Page header -->
    <div class="notifications-page__header">
      <div class="notifications-page__header-left">
        <h1 class="notifications-page__title">Notifications</h1>
        <span class="notifications-page__badge" *ngIf="(unreadCount$ | async) as count">
          {{ count }}
        </span>
      </div>
      <div class="notifications-page__header-actions">
        <button
          class="notifications-page__test-btn"
          (click)="onSendTest()">
          Send Test
        </button>
        <button
          class="notifications-page__mark-all-btn"
          *ngIf="(unreadCount$ | async) as count"
          (click)="onMarkAllRead()">
          Mark all as read
        </button>
      </div>
    </div>

    <!-- Error state -->
    <div class="notifications-page__error" *ngIf="error$ | async as error">
      {{ error }}
    </div>

    <!-- Loading spinner -->
    <app-loading-spinner
      *ngIf="loading$ | async"
      message="Loading notifications...">
    </app-loading-spinner>

    <!-- Notification list -->
    <ng-container *ngIf="!(loading$ | async)">
      <div class="notifications-page__list"
           *ngIf="(notifications$ | async) as notifications">

        <ng-container *ngIf="notifications.length > 0; else emptyState">
          <app-notification-item
            *ngFor="let notification of notifications; trackBy: trackByNotifId"
            [notification]="notification"
            (clicked)="onNotificationClick($event)">
          </app-notification-item>
        </ng-container>

        <!-- Empty state -->
        <ng-template #emptyState>
          <div class="notifications-page__empty">
            <div class="notifications-page__empty-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </div>
            <p class="notifications-page__empty-text">You're all caught up!</p>
            <p class="notifications-page__empty-hint">
              No notifications yet. Click "Send Test" to verify the system works,
              or try assigning a task to another user.
            </p>
          </div>
        </ng-template>

      </div>
    </ng-container>

  </div>
</div>
