<!-- Task Detail Modal — overlay + centered modal panel -->
<div class="task-modal__overlay" (click)="onClose()">
  <div class="task-modal" (click)="onModalClick($event)">

    <!-- Header -->
    <div class="task-modal__header">
      <h2 class="task-modal__title">Task Details</h2>
      <button class="task-modal__close-btn" (click)="onClose()">&times;</button>
    </div>

    <!-- Form body -->
    <form class="task-modal__body" [formGroup]="form" (ngSubmit)="onSave()">

      <!-- Issue Type selector -->
      <div class="task-modal__field">
        <label class="task-modal__label">Type</label>
        <div class="task-modal__issue-types">
          <button
            *ngFor="let type of issueTypes; trackBy: trackByIndex"
            type="button"
            class="task-modal__issue-type-btn"
            [class.task-modal__issue-type-btn--active]="form.get('issueType')?.value === type"
            [style.--issue-color]="issueTypeConfig[type].color"
            (click)="form.patchValue({ issueType: type })">
            <span class="task-modal__issue-type-icon">{{ issueTypeConfig[type].icon }}</span>
            {{ issueTypeConfig[type].label }}
          </button>
        </div>
      </div>

      <!-- Title -->
      <div class="task-modal__field">
        <label class="task-modal__label">Title</label>
        <input
          class="task-modal__input"
          type="text"
          formControlName="title"
          placeholder="Task title" />
      </div>

      <!-- Description -->
      <div class="task-modal__field">
        <label class="task-modal__label">Description</label>
        <textarea
          class="task-modal__textarea"
          formControlName="description"
          rows="3"
          placeholder="Add a description..."></textarea>
      </div>

      <!-- Row: Priority + Status -->
      <div class="task-modal__row">
        <div class="task-modal__field task-modal__field--half">
          <label class="task-modal__label">Priority</label>
          <select class="task-modal__select" formControlName="priority">
            <option *ngFor="let p of priorities; trackBy: trackByIndex" [value]="p">
              {{ p | titlecase }}
            </option>
          </select>
        </div>
        <div class="task-modal__field task-modal__field--half">
          <label class="task-modal__label">Status</label>
          <select class="task-modal__select" formControlName="status">
            <option *ngFor="let s of statuses; trackBy: trackByIndex" [value]="s">
              {{ s }}
            </option>
          </select>
        </div>
      </div>

      <!-- Row: Assignee + Deadline -->
      <div class="task-modal__row">
        <div class="task-modal__field task-modal__field--half">
          <label class="task-modal__label">Assignee</label>
          <div class="assignee-autocomplete">
            <div class="assignee-autocomplete__input-wrap">
              <input
                class="task-modal__input assignee-autocomplete__input"
                type="text"
                [value]="assigneeSearchText"
                (input)="onAssigneeSearch($any($event.target).value)"
                (focus)="onAssigneeFocus()"
                placeholder="Search members..." />
              <button
                *ngIf="assigneeSearchText"
                class="assignee-autocomplete__clear"
                type="button"
                (click)="clearAssignee()">
                &times;
              </button>
            </div>

            <ul
              class="assignee-autocomplete__dropdown"
              *ngIf="showAssigneeDropdown">
              <li
                class="assignee-autocomplete__item"
                *ngFor="let member of filteredMembers; trackBy: trackMember"
                (mousedown)="selectAssignee(member)">
                <span
                  class="assignee-autocomplete__avatar"
                  *ngIf="!member.avatarUrl">
                  {{ getInitials(member.displayName || member.email) }}
                </span>
                <img
                  class="assignee-autocomplete__avatar assignee-autocomplete__avatar--img"
                  *ngIf="member.avatarUrl"
                  [src]="member.avatarUrl"
                  [alt]="member.displayName" />
                <div class="assignee-autocomplete__info">
                  <span class="assignee-autocomplete__name">{{ member.displayName }}</span>
                  <span class="assignee-autocomplete__email">{{ member.email }}</span>
                </div>
              </li>
              <li
                class="assignee-autocomplete__empty"
                *ngIf="filteredMembers.length === 0">
                No members found
              </li>
            </ul>
          </div>
        </div>
        <div class="task-modal__field task-modal__field--half">
          <label class="task-modal__label">Deadline</label>
          <input
            class="task-modal__input"
            type="date"
            formControlName="deadline" />
        </div>
      </div>

      <!-- Labels -->
      <div class="task-modal__field">
        <label class="task-modal__label">Labels</label>
        <app-tag-input
          [tags]="taskLabels"
          [suggestions]="labelSuggestions"
          (tagsChange)="taskLabels = $event">
        </app-tag-input>
      </div>

      <!-- Subtasks section -->
      <div class="task-modal__section">
        <div class="task-modal__section-header">
          <span class="task-modal__label">Subtasks</span>
          <span class="task-modal__subtask-count" *ngIf="subtasks.length > 0">
            {{ subtaskProgress }}
          </span>
        </div>

        <!-- Subtask progress bar -->
        <div class="task-modal__progress" *ngIf="subtasks.length > 0">
          <div class="task-modal__progress-bar">
            <div
              class="task-modal__progress-fill"
              [style.width.%]="subtaskPercent">
            </div>
          </div>
          <span class="task-modal__progress-text">{{ subtaskPercent }}%</span>
        </div>

        <!-- Subtask list -->
        <ul class="task-modal__subtask-list">
          <li
            class="task-modal__subtask"
            *ngFor="let sub of subtasks; let i = index; trackBy: trackBySubtaskId">
            <label class="task-modal__subtask-check">
              <input
                type="checkbox"
                [checked]="sub.completed"
                (change)="toggleSubtask(i)" />
              <span
                class="task-modal__subtask-title"
                [class.task-modal__subtask-title--done]="sub.completed">
                {{ sub.title }}
              </span>
            </label>
            <button
              class="task-modal__subtask-remove"
              type="button"
              (click)="removeSubtask(i)">
              &times;
            </button>
          </li>
        </ul>

        <!-- Add subtask input -->
        <div class="task-modal__subtask-add">
          <input
            class="task-modal__input"
            type="text"
            placeholder="Add a subtask..."
            [(ngModel)]="newSubtaskTitle"
            [ngModelOptions]="{ standalone: true }"
            (keyup.enter)="addSubtask()" />
          <button
            class="task-modal__subtask-add-btn"
            type="button"
            (click)="addSubtask()">
            + Add
          </button>
        </div>
      </div>

      <!-- Comments section -->
      <div class="task-modal__section">
        <div class="task-modal__section-header">
          <span class="task-modal__label">Comments</span>
        </div>

        <app-comment-thread
          [comments]="(comments$ | async) || []"
          [currentUserId]="currentUserId"
          (editComment)="onEditComment($event)"
          (deleteComment)="onDeleteComment($event)">
        </app-comment-thread>

        <app-comment-input
          (commentSubmitted)="onCommentSubmitted($event)">
        </app-comment-input>
      </div>

      <!-- Footer actions -->
      <div class="task-modal__footer">
        <button
          class="task-modal__delete-btn"
          type="button"
          (click)="onDelete()">
          Delete
        </button>
        <div class="task-modal__footer-right">
          <button
            class="task-modal__cancel-btn"
            type="button"
            (click)="onClose()">
            Cancel
          </button>
          <button
            class="task-modal__save-btn"
            type="submit"
            [disabled]="form.invalid">
            Save Changes
          </button>
        </div>
      </div>

    </form>

  </div>
</div>
