<!-- Board Filters Bar -->
<div class="board-filters">

  <!-- Search input -->
  <div class="board-filters__search">
    <svg class="board-filters__search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      class="board-filters__search-input"
      type="text"
      placeholder="Search tasks..."
      [formControl]="searchControl" />
  </div>

  <!-- Priority toggle buttons -->
  <div class="board-filters__group">
    <span class="board-filters__label">Priority:</span>
    <div class="board-filters__toggles">
      <button
        *ngFor="let p of priorities; trackBy: trackByPriority"
        class="board-filters__toggle"
        [class.board-filters__toggle--active]="isPrioritySelected(p)"
        (click)="togglePriority(p)">
        {{ p | titlecase }}
      </button>
    </div>
  </div>

  <!-- Type toggle buttons -->
  <div class="board-filters__group">
    <span class="board-filters__label">Type:</span>
    <div class="board-filters__toggles">
      <button
        *ngFor="let t of issueTypes; trackBy: trackByIssueType"
        class="board-filters__toggle"
        [class.board-filters__toggle--active]="isIssueTypeSelected(t)"
        [style.--toggle-active-color]="issueTypeConfig[t].color"
        (click)="toggleIssueType(t)">
        <span class="board-filters__toggle-icon">{{ issueTypeConfig[t].icon }}</span>
        {{ issueTypeConfig[t].label }}
      </button>
    </div>
  </div>

  <!-- Assignee filter -->
  <div class="board-filters__group">
    <span class="board-filters__label">Assignee:</span>
    <input
      class="board-filters__input"
      type="text"
      placeholder="Filter by assignee..."
      [formControl]="assigneeControl" />
  </div>

  <!-- Clear button -->
  <button
    class="board-filters__clear-btn"
    *ngIf="hasActiveFilters"
    (click)="clearFilters()">
    Clear
  </button>

</div>
