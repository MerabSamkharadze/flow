<!-- Task Card: individual draggable task within a board column -->
<div class="task-card" (click)="onCardClick()">

  <!-- Issue type + labels + menu row (entire row is drag handle) -->
  <div class="task-card__top-row" cdkDragHandle>
    <span
      class="task-card__issue-type"
      [style.color]="issueTypeConfig.color"
      [title]="issueTypeConfig.label">
      {{ issueTypeConfig.icon }}
    </span>

    <div class="task-card__labels" *ngIf="task.labels && task.labels.length > 0">
      <span
        class="task-card__label"
        *ngFor="let label of visibleLabels; trackBy: trackByLabel"
        [style.background-color]="getLabelColor(label) + '1a'"
        [style.color]="getLabelColor(label)"
        [style.border-color]="getLabelColor(label) + '33'">
        {{ label }}
      </span>
      <span class="task-card__label task-card__label--more" *ngIf="extraLabelCount > 0">
        +{{ extraLabelCount }}
      </span>
    </div>

    <div class="task-card__top-spacer"></div>

    <button
      class="task-card__menu-btn"
      #menuBtn
      type="button"
      title="Task actions"
      (click)="toggleMenu($event)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
      </svg>
    </button>
  </div>

  <!-- Title -->
  <h4 class="task-card__title">{{ task.title }}</h4>

  <!-- Footer -->
  <div class="task-card__footer">
    <span
      class="task-card__priority"
      [style.background-color]="priorityConfig.color + '1a'"
      [style.color]="priorityConfig.color">
      {{ priorityConfig.label }}
    </span>

    <div class="task-card__spacer"></div>

    <span class="task-card__comments" *ngIf="commentCount > 0">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      {{ commentCount }}
    </span>

    <span class="task-card__time" *ngIf="loggedHours > 0">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      {{ loggedHours }}h
    </span>

    <span class="task-card__subtasks" *ngIf="totalSubtasks > 0">
      {{ completedSubtasks }}/{{ totalSubtasks }}
    </span>

    <span
      class="task-card__deadline"
      *ngIf="formattedDeadline"
      [class.task-card__deadline--overdue]="isOverdue">
      {{ formattedDeadline }}
    </span>

    <span class="task-card__assignee" *ngIf="task.assigneeId">
      {{ task.assigneeId.charAt(0) | uppercase }}
    </span>
  </div>
</div>

<!-- Fixed-position dropdown (outside card div to escape overflow clipping) -->
<div
  class="task-card__menu-dropdown"
  *ngIf="menuOpen"
  [style.top.px]="dropdownTop"
  [style.left.px]="dropdownLeft"
  (click)="$event.stopPropagation()">

  <button class="task-card__menu-item" type="button" (click)="onEdit($event)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Edit Task
  </button>

  <button class="task-card__menu-item" type="button" (click)="onCopy($event)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    Copy Task
  </button>

  <!-- Move to column (inline expandable) -->
  <button class="task-card__menu-item" type="button" (click)="onToggleMoveSubmenu($event)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
    </svg>
    Move to...
    <span class="task-card__menu-chevron"
          [class.task-card__menu-chevron--open]="moveSubmenuOpen">&#9656;</span>
  </button>

  <ng-container *ngIf="moveSubmenuOpen">
    <button
      class="task-card__menu-item task-card__menu-item--indent"
      *ngFor="let col of otherColumns; trackBy: trackByColumnId"
      type="button"
      (click)="onMoveToColumn($event, col.id)">
      <span class="task-card__submenu-dot" [style.background-color]="col.color"></span>
      {{ col.name }}
    </button>
    <span class="task-card__submenu-empty" *ngIf="otherColumns.length === 0">
      No other columns
    </span>
  </ng-container>

  <div class="task-card__menu-divider"></div>

  <button class="task-card__menu-item task-card__menu-item--danger" type="button" (click)="onRequestDelete($event)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    </svg>
    Delete Task
  </button>
</div>

<!-- Delete confirmation dialog -->
<app-confirm-dialog
  *ngIf="showDeleteConfirm"
  title="Delete Task"
  message="Are you sure you want to delete this task? This cannot be undone."
  confirmLabel="Delete"
  variant="danger"
  (confirmed)="onConfirmDelete()"
  (cancelled)="onCancelDelete()">
</app-confirm-dialog>
