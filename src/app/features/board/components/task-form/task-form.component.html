<!-- Task Quick-Create Form — shown inline inside a board column -->
<div class="task-form">

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Issue type selector -->
    <div class="task-form__issue-types">
      <button
        *ngFor="let type of issueTypes; trackBy: trackByIssueType"
        type="button"
        class="task-form__issue-type-btn"
        [class.task-form__issue-type-btn--active]="selectedIssueType === type"
        [style.--issue-color]="issueTypeConfig[type].color"
        (click)="selectIssueType(type)">
        <span class="task-form__issue-type-icon">{{ issueTypeConfig[type].icon }}</span>
        {{ issueTypeConfig[type].label }}
      </button>
    </div>

    <!-- Title input (auto-focused) -->
    <input
      class="task-form__title-input"
      type="text"
      formControlName="title"
      placeholder="Task title..."
      #titleInput />

    <!-- Options row: priority + assignee -->
    <div class="task-form__options">
      <select class="task-form__select" formControlName="priority">
        <option *ngFor="let p of priorities; trackBy: trackByPriority" [value]="p">
          {{ p | titlecase }}
        </option>
      </select>

      <input
        class="task-form__assignee-input"
        type="text"
        formControlName="assigneeId"
        placeholder="Assignee..." />
    </div>

    <!-- Labels (tag input) -->
    <app-tag-input
      [tags]="labels"
      [suggestions]="labelSuggestions"
      (tagsChange)="labels = $event">
    </app-tag-input>

    <!-- Action buttons -->
    <div class="task-form__actions">
      <button
        class="task-form__submit-btn"
        type="submit"
        [disabled]="form.invalid">
        Add Task
      </button>
      <button
        class="task-form__cancel-btn"
        type="button"
        (click)="onCancel()">
        Cancel
      </button>
    </div>

  </form>

</div>
