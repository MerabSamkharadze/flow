<!-- List View (placeholder) -->
<div class="list-view">

  <!-- Header -->
  <div class="list-view__header">
    <div class="list-view__header-left">
      <button class="list-view__back-btn" (click)="onGoBack()">
        &larr; Back
      </button>
      <h1 class="list-view__title">Board</h1>
    </div>
    <div class="list-view__header-right">
      <button class="list-view__view-btn" (click)="onSwitchToBoard()">
        Board
      </button>
      <button class="list-view__view-btn list-view__view-btn--active">
        List
      </button>
    </div>
  </div>

  <!-- Empty state — list view not yet implemented -->
  <div class="list-view__placeholder">
    <p class="list-view__placeholder-text">
      The list view will display tasks in a sortable, filterable table. Use the Board view for now.
    </p>
  </div>

</div>
