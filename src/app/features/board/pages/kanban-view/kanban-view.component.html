<!-- Kanban Board View — filters, drag & drop columns, detail modal -->
<div class="kanban-view">

  <!-- Board header -->
  <div class="kanban-view__header">
    <div class="kanban-view__header-left">
      <button class="kanban-view__back-btn" (click)="onGoBack()">
        &larr; Back
      </button>
      <h1 class="kanban-view__title">Board</h1>
    </div>
    <div class="kanban-view__header-right">
      <button class="kanban-view__view-btn kanban-view__view-btn--active">
        Board
      </button>
      <button class="kanban-view__view-btn" (click)="onSwitchToList()">
        List
      </button>
      <button class="kanban-view__view-btn" (click)="onSwitchToBacklog()">
        Backlog
      </button>
      <button class="kanban-view__view-btn" (click)="onSwitchToRoadmap()">
        Roadmap
      </button>
      <button class="kanban-view__add-col-btn" (click)="onAddColumn()">
        + Add Column
      </button>
    </div>
  </div>

  <!-- Board filters bar -->
  <app-board-filters
    [availableLabels]="(uniqueLabels$ | async) || []"
    (filtersChanged)="onFiltersChanged($event)">
  </app-board-filters>

  <!-- Loading spinner -->
  <app-loading-spinner
    *ngIf="loading$ | async"
    size="lg"
    message="Loading board...">
  </app-loading-spinner>

  <!-- Error message -->
  <div *ngIf="error$ | async as error" class="kanban-view__error">
    {{ error }}
  </div>

  <!-- Columns row — cdkDropListGroup connects all column drop zones -->
  <div class="kanban-view__board" cdkDropListGroup *ngIf="!(loading$ | async)">
    <app-board-column
      *ngFor="let column of columns$ | async; trackBy: trackByColumnId"
      [column]="column"
      [columns]="(columns$ | async) || []"
      [tasks]="(filteredTasksMap$ | async)?.[column.id] || []"
      [commentCounts]="(commentCounts$ | async) || {}"
      [labelSuggestions]="(uniqueLabels$ | async) || []"
      (addTask)="onAddTask($event)"
      (taskDropped)="onTaskDropped($event, column.id)"
      (taskClicked)="onTaskClicked($event)"
      (copyTaskRequest)="onCopyTask($event)"
      (moveTaskRequest)="onMoveTaskViaMenu($event)"
      (deleteTaskRequest)="onDeleteTaskFromCard($event)"
      (renameColumn)="onRenameColumn($event)"
      (deleteColumnRequest)="onDeleteColumn($event)">
    </app-board-column>
  </div>

  <!-- Task detail modal — shown when a task is selected -->
  <app-task-detail-modal
    *ngIf="activeTask$ | async as activeTask"
    [task]="activeTask"
    (closeModal)="onCloseModal()"
    (taskUpdated)="onTaskUpdated($event)"
    (taskDeleted)="onTaskDeleted($event)">
  </app-task-detail-modal>

</div>
