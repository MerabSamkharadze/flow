<!-- Dashboard: overview page with stat cards (data wired in Phase 6) -->
<div class="dashboard">
  <div class="dashboard__wrapper">
    <h1 class="dashboard__title">Dashboard</h1>
    <p class="dashboard__subtitle">Overview of your projects, tasks, and deadlines at a glance.</p>

    <!-- Stat cards grid -->
    <div class="dashboard__stats">

      <!-- Total Projects -->
      <div class="dashboard__stat-card">
        <div class="dashboard__stat-icon dashboard__stat-icon--projects">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="dashboard__stat-info">
          <span class="dashboard__stat-value">&mdash;</span>
          <span class="dashboard__stat-label">Total Projects</span>
        </div>
      </div>

      <!-- Active Tasks -->
      <div class="dashboard__stat-card">
        <div class="dashboard__stat-icon dashboard__stat-icon--active">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <div class="dashboard__stat-info">
          <span class="dashboard__stat-value">&mdash;</span>
          <span class="dashboard__stat-label">Active Tasks</span>
        </div>
      </div>

      <!-- Overdue Tasks -->
      <div class="dashboard__stat-card">
        <div class="dashboard__stat-icon dashboard__stat-icon--overdue">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="dashboard__stat-info">
          <span class="dashboard__stat-value">&mdash;</span>
          <span class="dashboard__stat-label">Overdue Tasks</span>
        </div>
      </div>

      <!-- Due Today -->
      <div class="dashboard__stat-card">
        <div class="dashboard__stat-icon dashboard__stat-icon--today">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="dashboard__stat-info">
          <span class="dashboard__stat-value">&mdash;</span>
          <span class="dashboard__stat-label">Due Today</span>
        </div>
      </div>

    </div>
  </div>
</div>
