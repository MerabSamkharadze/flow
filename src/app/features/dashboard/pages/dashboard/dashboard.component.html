<!-- Dashboard: overview page with stats, recent tasks, and projects -->
<div class="dashboard">
  <div class="dashboard__wrapper">

    <!-- Greeting -->
    <h1 class="dashboard__greeting">{{ greeting }}, {{ firstName }}</h1>

    <!-- Section 1: Stats row -->
    <div class="dashboard__stats-row">
      <app-stats-card
        label="Projects"
        icon="projects"
        [value]="(projects$ | async)?.length ?? null">
      </app-stats-card>

      <app-stats-card
        label="Active Tasks"
        icon="tasks"
        variant="success"
        [value]="activeCount$ | async">
      </app-stats-card>

      <app-stats-card
        label="Overdue"
        icon="overdue"
        variant="danger"
        [value]="(overdueTasks$ | async)?.length ?? null">
      </app-stats-card>

      <app-stats-card
        label="Due Today"
        icon="today"
        variant="warning"
        [value]="(todayTasks$ | async)?.length ?? null">
      </app-stats-card>
    </div>

    <!-- Section 2: Two-column body -->
    <div class="dashboard__body">
      <div class="dashboard__main">
        <app-recent-tasks
          [tasks]="(recentTasks$ | async) || []"
          [projectMap]="(projectMap$ | async) || {}">
        </app-recent-tasks>
      </div>

      <div class="dashboard__sidebar-col">
        <app-my-projects
          [projects]="(projects$ | async) || []">
        </app-my-projects>
      </div>
    </div>

  </div>
</div>
