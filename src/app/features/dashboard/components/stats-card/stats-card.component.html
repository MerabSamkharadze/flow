<!-- Stats Card: single stat with icon, value, and label -->
<div class="stats-card"
     [class.stats-card--warning]="variant === 'warning'"
     [class.stats-card--danger]="variant === 'danger'"
     [class.stats-card--success]="variant === 'success'">

  <!-- Icon circle -->
  <div class="stats-card__icon">
    <!-- Projects: folder icon -->
    <svg *ngIf="icon === 'projects'" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>

    <!-- Tasks: checkbox icon -->
    <svg *ngIf="icon === 'tasks'" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>

    <!-- Overdue: alert-circle icon -->
    <svg *ngIf="icon === 'overdue'" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>

    <!-- Today: calendar icon -->
    <svg *ngIf="icon === 'today'" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  </div>

  <!-- Value + label -->
  <div class="stats-card__content">
    <span class="stats-card__value">{{ displayValue }}</span>
    <span class="stats-card__label">{{ label }}</span>
  </div>
</div>
