<!-- Project List Page -->
<div class="project-list">

  <!-- Page header with title and action button -->
  <div class="project-list__header">
    <div class="project-list__title-group">
      <h1 class="project-list__title">Projects</h1>
      <span class="project-list__count" *ngIf="projects$ | async as projects">
        {{ projects.length }} projects
      </span>
    </div>
    <button class="project-list__new-btn" (click)="onNewProject()">
      + New Project
    </button>
  </div>

  <!-- Error state -->
  <div class="project-list__error" *ngIf="error$ | async as error">
    {{ error }}
  </div>

  <!-- Loading spinner -->
  <app-loading-spinner
    *ngIf="loading$ | async"
    message="Loading projects...">
  </app-loading-spinner>

  <!-- Project cards grid -->
  <ng-container *ngIf="!(loading$ | async)">
    <ng-container *ngIf="projects$ | async as projects">

      <div class="project-list__grid" *ngIf="projects.length > 0; else emptyState">
        <app-project-card
          *ngFor="let project of projects; trackBy: trackByProjectId"
          [project]="project">
        </app-project-card>
      </div>

      <!-- Empty state when no projects exist -->
      <ng-template #emptyState>
        <app-empty-state
          icon="projects"
          title="No projects yet"
          subtitle="Create your first project to get started."
          actionLabel="+ New Project"
          (actionClicked)="onNewProject()">
        </app-empty-state>
      </ng-template>

    </ng-container>
  </ng-container>

</div>
