<!-- Empty State: icon + title + subtitle + optional action button -->
<div class="empty-state">

  <!-- Icon -->
  <div class="empty-state__icon">
    <!-- Tasks icon -->
    <svg *ngIf="icon === 'tasks'" width="48" height="48" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>

    <!-- Projects icon -->
    <svg *ngIf="icon === 'projects'" width="48" height="48" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>

    <!-- Notifications icon -->
    <svg *ngIf="icon === 'notifications'" width="48" height="48" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>

    <!-- Search icon -->
    <svg *ngIf="icon === 'search'" width="48" height="48" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </div>

  <!-- Title -->
  <h3 class="empty-state__title">{{ title }}</h3>

  <!-- Subtitle -->
  <p class="empty-state__subtitle" *ngIf="subtitle">{{ subtitle }}</p>

  <!-- Action button -->
  <button class="empty-state__action" *ngIf="actionLabel" (click)="onAction()">
    {{ actionLabel }}
  </button>

</div>
