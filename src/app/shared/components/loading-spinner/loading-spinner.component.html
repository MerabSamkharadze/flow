<!-- Loading Spinner: CSS-only animated spinner with optional overlay -->
<div class="spinner"
     [class.spinner--overlay]="overlay"
     [class.spinner--sm]="size === 'sm'"
     [class.spinner--lg]="size === 'lg'">
  <div class="spinner__circle"></div>
  <span class="spinner__message" *ngIf="message">{{ message }}</span>
</div>
