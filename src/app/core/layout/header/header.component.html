<!-- Header: top navigation bar -->
<div class="header">

  <!-- Left section: hamburger toggle + page title -->
  <div class="header__left">
    <button class="header__menu-toggle" (click)="onMenuToggle()" title="Toggle sidebar">
      <span class="header__menu-icon">&#9776;</span>
    </button>
    <h2 class="header__page-title">{{ pageTitle }}</h2>
  </div>

  <!-- Right section: notifications, profile, logout -->
  <div class="header__right">

    <!-- Bell button with unread badge -->
    <button class="header__action" title="Notifications" routerLink="/notifications">
      <svg class="header__action-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="header__notif-badge"
            *ngIf="(unreadCount$ | async) as count">
        {{ count }}
      </span>
    </button>

    <div class="header__divider"></div>

    <div class="header__profile" *ngIf="user$ | async as user"
         [title]="(user.displayName || 'User') + ' — ' + (user.email || '') + ' (' + user.role + ')'">
      <div class="header__avatar">
        <img
          *ngIf="user.photoURL"
          class="header__avatar-img"
          [src]="user.photoURL"
          [alt]="user.displayName || 'User'" />
        <span
          *ngIf="!user.photoURL"
          class="header__avatar-initials">
          {{ (user.displayName || user.email || 'U').charAt(0) | uppercase }}
        </span>
      </div>
      <div class="header__user-info">
        <span class="header__user-name">{{ user.displayName || 'User' }}</span>
        <span class="header__role-badge header__role-badge--{{ user.role }}">{{ user.role }}</span>
      </div>
    </div>
  </div>

</div>
