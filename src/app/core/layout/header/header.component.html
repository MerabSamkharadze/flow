<!-- Header: top navigation bar -->
<div class="header">

  <!-- Left section: hamburger toggle + breadcrumb -->
  <div class="header__left">
    <button class="header__menu-toggle" (click)="onMenuToggle()">
      &#9776; <!-- hamburger icon placeholder -->
    </button>
    <nav class="header__breadcrumb">
      <!-- Breadcrumbs will be dynamically populated later -->
      <span class="header__breadcrumb-item">Home</span>
    </nav>
  </div>

  <!-- Right section: search, notifications, profile -->
  <div class="header__right">
    <button class="header__action" title="Search">
      &#128269; <!-- search icon placeholder -->
    </button>
    <button class="header__action" title="Notifications">
      &#128276; <!-- bell icon placeholder -->
    </button>
    <div class="header__avatar" *ngIf="user$ | async as user">
      <span class="header__avatar-initials">
        {{ (user.displayName || user.email || 'U').charAt(0) | uppercase }}
      </span>
    </div>
    <button class="header__action header__action--logout" title="Logout" (click)="onLogout()">
      Logout
    </button>
  </div>

</div>
