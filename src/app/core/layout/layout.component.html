<!-- Layout: main application shell with sidebar + content area -->
<div class="layout"
     [class.layout--collapsed]="isSidebarCollapsed"
     [class.layout--sidebar-open]="isSidebarOpen">

  <!-- Mobile overlay -->
  <div class="layout__overlay" *ngIf="isSidebarOpen" (click)="onOverlayClick()"></div>

  <!-- Left: Sidebar navigation -->
  <aside class="layout__sidebar">
    <app-sidebar
      [isCollapsed]="isSidebarCollapsed"
      (toggleSidebar)="onToggleSidebar()">
    </app-sidebar>
  </aside>

  <!-- Right: Header + routed content -->
  <div class="layout__main">
    <header class="layout__header">
      <app-header (toggleSidebar)="onToggleSidebar()"></app-header>
    </header>

    <main class="layout__content">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
