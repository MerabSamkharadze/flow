<!-- Sidebar: left navigation panel -->
<nav class="sidebar" [class.sidebar--collapsed]="isCollapsed">

  <!-- Logo / brand area -->
  <div class="sidebar__brand">
    <span class="sidebar__logo">F</span>
    <span class="sidebar__title" *ngIf="!isCollapsed">FLOW</span>
  </div>

  <!-- Main navigation links -->
  <ul class="sidebar__nav">

    <!-- Dashboard -->
    <li class="sidebar__nav-item">
      <a class="sidebar__nav-link" routerLink="/dashboard" routerLinkActive="sidebar__nav-link--active">
        <span class="sidebar__nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </span>
        <span class="sidebar__nav-label" *ngIf="!isCollapsed">Dashboard</span>
      </a>
    </li>

    <!-- Projects -->
    <li class="sidebar__nav-item">
      <a class="sidebar__nav-link" routerLink="/projects" routerLinkActive="sidebar__nav-link--active">
        <span class="sidebar__nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </span>
        <span class="sidebar__nav-label" *ngIf="!isCollapsed">Projects</span>
      </a>
    </li>

    <!-- My Tasks -->
    <li class="sidebar__nav-item">
      <a class="sidebar__nav-link" routerLink="/my-tasks" routerLinkActive="sidebar__nav-link--active">
        <span class="sidebar__nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </span>
        <span class="sidebar__nav-label" *ngIf="!isCollapsed">My Tasks</span>
      </a>
    </li>

    <!-- Team -->
    <li class="sidebar__nav-item">
      <a class="sidebar__nav-link" routerLink="/team" routerLinkActive="sidebar__nav-link--active">
        <span class="sidebar__nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="sidebar__nav-label" *ngIf="!isCollapsed">Team</span>
      </a>
    </li>

    <!-- Notifications — with unread count badge -->
    <li class="sidebar__nav-item">
      <a class="sidebar__nav-link" routerLink="/notifications" routerLinkActive="sidebar__nav-link--active">
        <span class="sidebar__nav-icon sidebar__nav-icon--badged">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <!-- Small red dot badge on icon — visible in collapsed mode -->
          <span class="sidebar__icon-dot" *ngIf="(unreadCount$ | async) as count"></span>
        </span>
        <span class="sidebar__nav-label" *ngIf="!isCollapsed">
          Notifications
        </span>
        <!-- Numeric badge pill — visible only in expanded mode -->
        <span class="sidebar__nav-badge" *ngIf="!isCollapsed && (unreadCount$ | async) as count">
          {{ count }}
        </span>
      </a>
    </li>

  </ul>

  <!-- Separator between main nav and footer nav -->
  <div class="sidebar__separator"></div>

  <!-- Footer nav: Settings -->
  <ul class="sidebar__nav sidebar__nav--footer">
    <li class="sidebar__nav-item">
      <a class="sidebar__nav-link" routerLink="/settings" routerLinkActive="sidebar__nav-link--active">
        <span class="sidebar__nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="sidebar__nav-label" *ngIf="!isCollapsed">Settings</span>
      </a>
    </li>
  </ul>

  <!-- Collapse toggle button at the bottom -->
  <div class="sidebar__footer">
    <button class="sidebar__toggle" (click)="onToggle()">
      <span class="sidebar__toggle-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline *ngIf="isCollapsed" points="9 18 15 12 9 6"/>
          <polyline *ngIf="!isCollapsed" points="15 18 9 12 15 6"/>
        </svg>
      </span>
    </button>
  </div>

</nav>
