<!-- Toast Container: fixed stack of toast notifications -->
<div class="toast-container" *ngIf="toasts$ | async as toasts">
  <div class="toast"
       *ngFor="let toast of toasts; trackBy: trackById"
       [class.toast--success]="toast.type === 'success'"
       [class.toast--error]="toast.type === 'error'"
       [class.toast--warning]="toast.type === 'warning'"
       [class.toast--info]="toast.type === 'info'"
       role="alert">

    <!-- Icon per type -->
    <span class="toast__icon">
      <ng-container [ngSwitch]="toast.type">
        <!-- Success checkmark -->
        <svg *ngSwitchCase="'success'" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <!-- Error X-circle -->
        <svg *ngSwitchCase="'error'" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <!-- Warning triangle -->
        <svg *ngSwitchCase="'warning'" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <!-- Info circle -->
        <svg *ngSwitchDefault width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
      </ng-container>
    </span>

    <!-- Message text -->
    <span class="toast__message">{{ toast.message }}</span>

    <!-- Dismiss button -->
    <button class="toast__close" type="button" (click)="onDismiss(toast.id)" aria-label="Dismiss">
      &times;
    </button>

    <!-- Auto-dismiss progress bar -->
    <div class="toast__progress"
         [style.animation-duration.ms]="toast.duration">
    </div>
  </div>
</div>
